<!DOCTYPE html>
<html>
<head>
  <title>Control Panel</title>
  <link href="{{ url_for('static', filename='css/index.css') }}" rel="stylesheet" type="text/css"/>
  <link href="{{ url_for('static', filename='css/buttons.css') }}" rel="stylesheet" type="text/css"/>
  <link href="{{ url_for('static', filename='css/background.css') }}" rel="stylesheet" type="text/css"/>
  <link href="{{ url_for('static', filename='css/battery.css') }}" rel="stylesheet" type="text/css"/>
  <meta charset="UTF-8">
</head>
<body>
    <div class="h"></div>
    <div class="v"></div>
    <script>
        for (let i = 0; i < 10; i++) {
            const r = document.createElement('div');
            r.className = 'rainbow';
            document.body.appendChild(r);
        }
    </script>
    <div class="header">
      <h2>🛰️ Мониторинг нефтепровода - ArUco 10×10</h2>
      <div class="controls">
        <button id="start" class="btn-start" onclick="startMission()">▶️ Старт</button>

        <button id="stop" class="btn-stop" onclick="stopMission()">⏹️ Стоп</button>

        <button id="kill" class="btn-kill" onclick="kill()">💀 Kill</button>

        <button id="home" class="btn-home" onclick="home()">🏠 Home</button>

        <button id="land" class="btn-land" onclick="home()">⬇️ Land</button>

        <span id="status" class="status">Статус: idle</span>

        <div id="battery" class="battery-container battery-good" title="Заряд батареи">
          <div class="battery-icon">
              <div class="battery-level" id="battery-level" style="width: 100%"></div>
          </div>
          <div class="battery-text">
              <span class="battery-percent" id="battery-percent">100%</span>
              <span class="battery-voltage" id="battery-voltage">12.6 V</span>
          </div>
        </div>
      </div>
    </div>
    
    <div id="map-container">
      <canvas id="map" width="550" height="550"></canvas>
    </div>
    
    <div class="legend">
      <div class="legend-item"><span class="legend-color drone-color"></span> Дрон</div>
      <div class="legend-item"><span class="legend-color tap-color"></span> Врезка</div>
      <!-- <div class="legend-item"><span class="legend-color marker-color"></span> ArUco-маркер</div> -->
      <div class="legend-item">Шаг сетки: 1 м</div>
    </div>
    
    <h3>Найденные врезки:</h3>
    <ul id="taps-list"></ul>
    
    <script>
      // Настройки
      const MAP_SIZE_M = 10;           // 10×10 м
      const PX_PER_M = 50;             // масштаб: 1 м = 50 px
      const OFFSET_X = 25;             // отступ слева/сверху (для маркеров у края)
      const OFFSET_Y = 25;
      
      let drone = { x: 0, y: 0, yaw: -1.57 };
      let taps = [];                   // [{x, y}, ...]
      // let route = [];                  // [{x, y}, ...]
      let status = 'idle';
      let markers = [];   // [{id, x, y, z, length}, ...]

      const canvas = document.getElementById('map');
      const ctx = canvas.getContext('2d');
      
      // --- Отрисовка карты ---
      function drawMap() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (markers.length === 0) {
          // Fallback: draw placeholder grid if no map yet
          drawFallbackGrid();
          drawDroneAndTaps();
          return;
        }

        // 🔍 Determine map bounds from real markers
        const xs = markers.map(m => m.x);
        const ys = markers.map(m => m.y);
        const minX = Math.min(...xs);
        const maxX = Math.max(...xs);
        const minY = Math.min(...ys);
        const maxY = Math.max(...ys);

        // Add small padding (e.g., 0.5 m)
        const padding = 0.5;
        const mapWidth = maxX - minX + 2 * padding;
        const mapHeight = maxY - minY + 2 * padding;

        // Fit map to canvas (550×550) with margins
        const margin = 30;
        const scaleX = (canvas.width - 2 * margin) / mapWidth;
        const scaleY = (canvas.height - 2 * margin) / mapHeight;
        const scale = Math.min(scaleX, scaleY); // preserve aspect ratio

        // Compute offsets so map is centered
        const offsetX = margin + (canvas.width - 2 * margin - mapWidth * scale) / 2;
        const offsetY = margin + (canvas.height - 2 * margin - mapHeight * scale) / 2;

        // Helper: world → pixel
        function toPx(worldX, worldY) {
          const px = offsetX + (worldX - (minX - padding)) * scale;
          const py = canvas.height - (offsetY + (worldY - (minY - padding)) * scale); // flip Y: 0 at bottom
          return { x: px, y: py };
        }

        // 🔷 Draw axes grid (light gray, 1m steps)
        ctx.strokeStyle = '#e0e0e0';
        ctx.lineWidth = 1;

        // Draw vertical lines (X direction)
        for (let x = Math.floor(minX - padding); x <= Math.ceil(maxX + padding); x++) {
          const p = toPx(x, minY - padding);
          const q = toPx(x, maxY + padding);
          ctx.beginPath();
          ctx.moveTo(p.x, p.y);
          ctx.lineTo(q.x, q.y);
          ctx.stroke();
        }

        // Draw horizontal lines (Y direction)
        for (let y = Math.floor(minY - padding); y <= Math.ceil(maxY + padding); y++) {
          const p = toPx(minX - padding, y);
          const q = toPx(maxX + padding, y);
          ctx.beginPath();
          ctx.moveTo(p.x, p.y);
          ctx.lineTo(q.x, q.y);
          ctx.stroke();
        }

        // 🔲 Draw real ArUco markers
        markers.forEach(m => {
          const center = toPx(m.x, m.y);
          const half = (m.length / 2) * scale;
          // Draw square (rotated 0° — assume upright)
          ctx.fillStyle = '#6c757d';
          ctx.fillRect(center.x - half, center.y - half, 2 * half, 2 * half);
          ctx.strokeStyle = '#495057';
          ctx.lineWidth = 1;
          ctx.strokeRect(center.x - half, center.y - half, 2 * half, 2 * half);
          // ID label
          ctx.fillStyle = '#fff';
          ctx.font = '10px Arial';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(`#${m.id}`, center.x, center.y);
        });

        // // ▶️ Draw route (if any)
        // if (route.length > 1) {
        //   ctx.strokeStyle = '#00FF00'; // green
        //   ctx.lineWidth = 7;
        //   ctx.beginPath();
        //   route.forEach((pt, i) => {
        //     const p = toPx(pt.x, pt.y);
        //     if (i === 0) ctx.moveTo(p.x, p.y);
        //     else ctx.lineTo(p.x, p.y);
        //   });
        //   ctx.stroke();
        // }

        // Draw taps
        ctx.fillStyle = '#dc3545';
        taps.forEach(t => {
          // Assuming t is {x, y} or just [x, y, z...]
          const x = typeof t === 'object' ? t.x : t[0];
          const y = typeof t === 'object' ? t.y : t[1];
          const p = toPx(x, y);
          ctx.beginPath();
          ctx.arc(p.x, p.y, 8, 0, 2 * Math.PI);
          ctx.fill();
          ctx.strokeStyle = '#fff';
          ctx.lineWidth = 2;
          ctx.stroke();
        });

        // 🛰️ Draw drone
        const d = toPx(drone.x, drone.y);
        ctx.save();
        ctx.translate(d.x, d.y);
        ctx.rotate(-drone.yaw); // rotate triangle
        ctx.fillStyle = '#007bff';
        ctx.beginPath();
        ctx.moveTo(0, -10);
        ctx.lineTo(-6, 8);
        ctx.lineTo(6, 8);
        ctx.closePath();
        ctx.fill();
        ctx.restore();

        // Axis labels (optional)
        ctx.fillStyle = '#333';
        ctx.font = '12px Arial';
        ctx.textAlign = 'left';
        ctx.fillText('X →', canvas.width - 40, canvas.height - 10);
        ctx.save();
        ctx.translate(15, canvas.height - 15);
        ctx.rotate(-Math.PI / 2);
        ctx.textAlign = 'center';
        ctx.fillText('Y ↑', 0, 0);
        ctx.restore();
      }

      // Fallback: draw 10×10 grid if no map yet
      function drawFallbackGrid() {
        const MAP_SIZE_M = 10;
        const PX_PER_M = 50;
        const OFFSET_X = 25;
        const OFFSET_Y = 25;

        ctx.strokeStyle = '#e0e0e0';
        ctx.lineWidth = 1;
        for (let i = 0; i <= MAP_SIZE_M; i++) {
          const x = OFFSET_X + i * PX_PER_M;
          const y0 = OFFSET_Y;
          const y1 = OFFSET_Y + MAP_SIZE_M * PX_PER_M;
          ctx.beginPath();
          ctx.moveTo(x, y0); ctx.lineTo(x, y1);
          ctx.moveTo(y0, x); ctx.lineTo(y1, x);
          ctx.stroke();
        }

        // Grid markers (placeholder)
        ctx.fillStyle = '#ccc';
        for (let i = 0; i < 10; i++) {
          for (let j = 0; j < 10; j++) {
            ctx.fillRect(OFFSET_X + i * PX_PER_M - 2, OFFSET_Y + j * PX_PER_M - 2, 4, 4);
          }
        }
      }

      function drawDroneAndTaps() {
        // Reuse existing drone/tap drawing logic, but with fallback coords
        const MAP_SIZE_M = 10;
        const PX_PER_M = 50;
        const OFFSET_X = 25;
        const OFFSET_Y = 25;

        const dx = OFFSET_X + drone.x * PX_PER_M;
        const dy = OFFSET_Y + (MAP_SIZE_M - drone.y) * PX_PER_M;
        ctx.save();
        ctx.translate(dx, dy);
        ctx.rotate(-drone.yaw);
        ctx.fillStyle = '#007bff';
        ctx.beginPath();
        ctx.moveTo(0, -10);
        ctx.lineTo(-6, 8);
        ctx.lineTo(6, 8);
        ctx.closePath();
        ctx.fill();
        ctx.restore();


        ctx.fillStyle = '#dc3545';
        taps.forEach(t => {
          const x = typeof t === 'object' ? t.x : t[0];
          const y = typeof t === 'object' ? t.y : t[1];
          const px = OFFSET_X + x * PX_PER_M;
          const py = OFFSET_Y + (MAP_SIZE_M - y) * PX_PER_M;
          ctx.beginPath();
          ctx.arc(px, py, 8, 0, 2 * Math.PI);
          ctx.fill();
          ctx.strokeStyle = '#fff';
          ctx.lineWidth = 2;
          ctx.stroke();
        });
      }
      
        // Дрон (треугольник, ориентированный по yaw)
        const dx = OFFSET_X + drone.x * PX_PER_M;
        const dy = OFFSET_X + (MAP_SIZE_M - drone.y) * PX_PER_M; // ←⚠️ Fixed: was OFFSET_Y before
        ctx.save();
        ctx.translate(dx, dy);
        ctx.rotate(-drone.yaw);
        ctx.fillStyle = '#007bff';
        ctx.beginPath();
        ctx.moveTo(0, -10);
        ctx.lineTo(-6, 8);
        ctx.lineTo(6, 8);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      
        // Подписи осей
        ctx.fillStyle = '#333';
        ctx.font = '12px Arial';
        ctx.fillText('X →', OFFSET_X + MAP_SIZE_M * PX_PER_M + 10, OFFSET_Y + MAP_SIZE_M * PX_PER_M + 15);
        ctx.save();
        ctx.translate(10, OFFSET_Y + MAP_SIZE_M * PX_PER_M + 10);
        ctx.rotate(-Math.PI / 2);
        ctx.fillText('Y ↑', 0, 0);
        ctx.restore();
      

      async function fetchMap() {
        try {
          const res = await fetch('/map');
          const data = await res.json();
          markers = data.markers || [];
        } catch (e) {
          console.warn('Не удалось получить карту ArUco');
          markers = [];
        }
      }

      // --- Запросы к серверу ---
      async function fetchDrone() {
        try {
          const res = await fetch('/drone');
          const data = await res.json();
          drone = { x: data.x, y: data.y, yaw: data.yaw - 1.57 };
        } catch (e) {
          console.warn('Не удалось получить позицию дрона');
        }
      }
      
      
      async function fetchTaps() {
        try {
          const res = await fetch('/taps');
          const data = await res.json(); // [{x:1.2, y:1.5}, ...]
          taps = data;
        } catch (e) {
          console.warn('Не удалось получить список врезок', e);
        }
      }
      
      async function fetchStatus() {
        try {
          const res = await fetch('/status');
          const data = await res.json();
          status = data.status || 'unknown';
          document.getElementById('status').innerText = `Статус: ${status}`;
          document.getElementById('status').className = `status status-${status}`;
          const startBtn = document.getElementById('start');
          startBtn.disabled = (status === 'flying');
        } catch (e) {
          console.warn('Не удалось получить статус');
        }
      }

      async function fetchRoute() {
        try {
          const res = await fetch('/route');
          const data = await res.json();
          route = data;
        } catch (e) {
          console.warn(e);
          route = [];
        }
      }
      
      // === 🔋 Battery State ===
      let battery = { voltage: 0, percentage: 100 };

      async function fetchBattery() {
          try {
              const res = await fetch('/state');
              const data = await res.json();
              battery = {
                  voltage: parseFloat(data.voltage) || 0,
                  percentage: Math.min(100, Math.max(0, parseFloat(data.percentage) || 0))
              };
              updateBatteryUI();
          } catch (e) {
              console.warn('Не удалось получить состояние батареи', e);
              // Не прерываем работу, просто не обновляем
          }
      }

      function updateBatteryUI() {
          const levelEl = document.getElementById('battery-level');
          const percentEl = document.getElementById('battery-percent');
          const voltageEl = document.getElementById('battery-voltage');
          const container = document.getElementById('battery');
          
          // Обновляем значения
          levelEl.style.width = `${battery.percentage}%`;
          percentEl.textContent = `${Math.round(battery.percentage)}%`;
          voltageEl.textContent = `${battery.voltage.toFixed(2)} V`;
          
          // Определяем состояние и применяем классы
          container.classList.remove('battery-good', 'battery-medium', 'battery-low', 'battery-critical');
          
          if (battery.percentage > 50) {
              container.classList.add('battery-good');
          } else if (battery.percentage > 25) {
              container.classList.add('battery-medium');
          } else if (battery.percentage > 10) {
              container.classList.add('battery-low');
              // Показываем toast-уведомление при первом переходе в low
              if (!window.batteryLowNotified) {
                  showToast('⚠️ Низкий заряд батареи: ' + Math.round(battery.percentage) + '%', 'warning');
                  window.batteryLowNotified = true;
              }
          } else {
              container.classList.add('battery-critical');
              // Критическое предупреждение
              if (!window.batteryCriticalNotified) {
                  showToast('🔴 КРИТИЧЕСКИЙ ЗАРЯД: ' + Math.round(battery.percentage) + '% — посадите дрон!', 'danger');
                  window.batteryCriticalNotified = true;
              }
          }
      }

      // Сброс флагов уведомлений при зарядке > 60%
      function resetBatteryNotifications() {
          if (battery.percentage > 60) {
              window.batteryLowNotified = false;
              window.batteryCriticalNotified = false;
          }
      }

      // --- Обновление ---
      function update() {
        Promise.all([
            fetchDrone(), 
            fetchTaps(), 
            fetchStatus(), 
            fetchRoute(), 
            fetchMap(),
            fetchBattery()  // <-- Добавили запрос батареи
        ]).then(() => {
            drawMap();
            updateTapsList();
            resetBatteryNotifications(); // Сбрасываем уведомления при восстановлении заряда
        });
      }

      function updateTapsList() {
        const list = document.getElementById('taps-list');
        list.innerHTML = taps.length === 0
          ? '<li>Врезки не обнаружены</li>'
          : taps.map((t, i) => `<li><strong>#${i+1}</strong>: (${t.x.toFixed(2)}, ${t.y.toFixed(2)}) м</li>`).join('');
      }
      
      // --- Управление ---
      async function sendCommand(cmd) {
        try {
          await fetch('/command', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ command: cmd })
          });
        } catch (e) {
          console.log(e)
          alert('Ошибка отправки команды');
        }
      }
      function startMission() { sendCommand('start'); }
      function stopMission()  { sendCommand('stop'); }
      function kill()         { sendCommand('kill'); }
      function home()         { sendCommand('home'); }
      function land()         { sendCommand('land') }

      // --- Инициализация ---
      drawMap();
      setInterval(update, 100);
      
      // Поддержка масштабирования колесом (опционально)
      canvas.addEventListener('wheel', (e) => {
        e.preventDefault();
        // zoom logic can be added later
      }, { passive: false });
      </script>
    
</body>
</html>
