<!DOCTYPE html>
<html>
<head>
    <title>Control Panel</title>
    <link href="{{ url_for('static', filename='styles/index.css') }}" rel="stylesheet" type="text/css"/>
    <meta charset="UTF-8">
    <style>
      * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    }

    body {
        font-family: 'Segoe UI', system-ui, -apple-system, 'Roboto', 'Helvetica Neue', sans-serif;
        background: #0f0f1a;
        color: #e0e0ff;
        overflow: hidden;
        position: relative;
        line-height: 1.6;
    }

    h2, h3 {
        font-weight: 600;
        letter-spacing: -0.02em;
        color: #ffffff;
        text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
    }

    h2 {
        font-size: 1.4rem;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }

    h3 {
        font-size: 1.1rem;
        color: #c0c0ff;
        margin: 20px 0 10px;
        padding-left: 10px;
        border-left: 3px solid #667eea;
    }

    p, li, span, button {
        font-size: 0.95rem;
        font-weight: 400;
    }

    /* === 🎯 Кнопки — современный стиль === */
    .controls {
        display: flex;
        gap: 12px;
        align-items: center;
        flex-wrap: wrap;
    }

    button {
        position: relative;
        padding: 10px 22px;
        border: none;
        border-radius: 12px;
        font-weight: 600;
        font-size: 0.9rem;
        cursor: pointer;
        transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        display: flex;
        align-items: center;
        gap: 6px;
        overflow: hidden;
        background: linear-gradient(135deg, #1a1a2e, #16213e);
        color: #fff;
        box-shadow: 
            0 4px 15px rgba(0, 0, 0, 0.3),
            0 0 0 1px rgba(255, 255, 255, 0.1) inset;
        backdrop-filter: blur(10px);
    }

    button::before {
        content: '';
        position: absolute;
        top: 0; left: -100%;
        width: 100%; height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
        transition: left 0.4s ease;
    }

    button:hover::before {
        left: 100%;
    }

    button:hover {
        transform: translateY(-2px);
        box-shadow: 
            0 8px 25px rgba(0, 0, 0, 0.4),
            0 0 0 1px rgba(255, 255, 255, 0.2) inset;
    }

    button:active {
        transform: translateY(0);
        transition-duration: 0.1s;
    }

    button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none !important;
    }

    button:disabled:hover::before {
        left: -100%;
    }

    /* 🟢 Старт */
    .btn-start {
        background: linear-gradient(135deg, #00b894, #00cec9);
        box-shadow: 
            0 4px 20px rgba(0, 184, 148, 0.4),
            0 0 20px rgba(0, 206, 201, 0.2);
    }
    .btn-start:hover {
        box-shadow: 
            0 8px 30px rgba(0, 184, 148, 0.6),
            0 0 30px rgba(0, 206, 201, 0.4);
    }

    /* 🟡 Стоп */
    .btn-stop {
        background: linear-gradient(135deg, #fdcb6e, #f39c12);
        color: #1a1a2e;
        box-shadow: 
            0 4px 20px rgba(253, 203, 110, 0.4),
            0 0 20px rgba(243, 156, 18, 0.2);
    }
    .btn-stop:hover {
        box-shadow: 
            0 8px 30px rgba(253, 203, 110, 0.6),
            0 0 30px rgba(243, 156, 18, 0.4);
    }

    /* 🔴 Kill */
    .btn-kill {
        background: linear-gradient(135deg, #ff7675, #d63031);
        box-shadow: 
            0 4px 20px rgba(255, 118, 117, 0.4),
            0 0 20px rgba(214, 48, 49, 0.3);
    }
    .btn-kill:hover {
        box-shadow: 
            0 8px 30px rgba(255, 118, 117, 0.6),
            0 0 30px rgba(214, 48, 49, 0.5);
        animation: pulse 0.3s ease;
    }

    @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.03); }
    }

    /* === 📊 Статус === */
    .status {
        padding: 8px 16px;
        border-radius: 20px;
        font-weight: 600;
        font-size: 0.85rem;
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.2);
        backdrop-filter: blur(10px);
        transition: all 0.3s ease;
    }

    .status-idle    { background: rgba(40, 167, 69, 0.2); border-color: #28a745; color: #28a745; box-shadow: 0 0 15px rgba(40, 167, 69, 0.3); }
    .status-flying  { background: rgba(0, 123, 255, 0.2); border-color: #007bff; color: #66b0ff; box-shadow: 0 0 15px rgba(0, 123, 255, 0.3); animation: breathe 2s ease-in-out infinite; }
    .status-aborted { background: rgba(253, 126, 20, 0.2); border-color: #fd7e14; color: #fd7e14; }
    .status-killed  { background: rgba(220, 53, 69, 0.3); border-color: #dc3545; color: #ff6b6b; box-shadow: 0 0 20px rgba(220, 53, 69, 0.4); }

    @keyframes breathe {
        0%, 100% { box-shadow: 0 0 15px rgba(0, 123, 255, 0.3); }
        50% { box-shadow: 0 0 25px rgba(0, 123, 255, 0.6); }
    }

    /* === 🪟 Хедер — glassmorphism === */
    .header {
        position: relative;
        z-index: 10;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 16px 24px;
        background: rgba(26, 26, 46, 0.7);
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
    }

    /* === 🗺️ Контейнер карты === */
    #map-container {
        position: relative;
        z-index: 10;
        display: flex;
        justify-content: center;
        margin: 24px 0;
        padding: 4px;
        background: linear-gradient(135deg, rgba(102, 126, 234, 0.3), rgba(118, 75, 162, 0.3));
        border-radius: 16px;
        box-shadow: 
            0 10px 40px rgba(0, 0, 0, 0.4),
            0 0 0 1px rgba(255, 255, 255, 0.1) inset;
    }

    canvas {
        border-radius: 12px;
        background: rgba(15, 15, 26, 0.95);
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }

    /* === 📋 Легенда === */
    .legend {
        position: relative;
        z-index: 10;
        display: flex;
        justify-content: center;
        gap: 24px;
        margin: 20px 0;
        padding: 12px 20px;
        background: rgba(26, 26, 46, 0.5);
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
    }

    .legend-item {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 0.9rem;
        color: #c0c0ff;
    }

    .legend-color {
        width: 14px;
        height: 14px;
        border-radius: 4px;
        box-shadow: 0 0 10px currentColor;
    }
    .drone-color   { background: #667eea; color: #667eea; }
    .tap-color     { background: #ff7675; color: #ff7675; }
    .marker-color  { background: #a29bfe; color: #a29bfe; }

    /* === 📝 Список врезок === */
    #taps-list {
        position: relative;
        z-index: 10;
        max-height: 180px;
        overflow-y: auto;
        padding: 12px 20px;
        margin: 0 20px 20px;
        background: rgba(26, 26, 46, 0.5);
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        list-style: none;
    }

    #taps-list li {
        padding: 8px 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        color: #e0e0ff;
        font-size: 0.9rem;
    }

    #taps-list li:last-child {
        border-bottom: none;
    }

    #taps-list li strong {
        color: #667eea;
        font-weight: 600;
    }

    /* Скроллбар для списка */
    #taps-list::-webkit-scrollbar {
        width: 6px;
    }
    #taps-list::-webkit-scrollbar-track {
        background: rgba(255, 255, 255, 0.05);
        border-radius: 3px;
    }
    #taps-list::-webkit-scrollbar-thumb {
        background: linear-gradient(135deg, #667eea, #764ba2);
        border-radius: 3px;
    }

    /* === 🍞 Toast уведомления (обновлённые) === */
    #toast-container {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 10000;
        display: flex;
        flex-direction: column;
        gap: 12px;
        pointer-events: none;
    }

    .toast {
        min-width: 300px;
        max-width: 420px;
        padding: 14px 20px;
        border-radius: 14px;
        color: white;
        font-size: 0.9rem;
        font-weight: 500;
        box-shadow: 
            0 10px 40px rgba(0, 0, 0, 0.4),
            0 0 0 1px rgba(255, 255, 255, 0.1) inset;
        display: flex;
        align-items: center;
        gap: 12px;
        pointer-events: auto;
        animation: slideIn 0.3s cubic-bezier(0.4, 0, 0.2, 1), fadeOut 0.3s ease 2.7s forwards;
        backdrop-filter: blur(15px);
    }

    .toast.success { 
        background: linear-gradient(135deg, rgba(40, 167, 69, 0.9), rgba(32, 201, 151, 0.9)); 
        border: 1px solid rgba(40, 167, 69, 0.5);
    }
    .toast.warning { 
        background: linear-gradient(135deg, rgba(253, 126, 20, 0.9), rgba(255, 193, 7, 0.9)); 
        color: #1a1a2e;
        border: 1px solid rgba(253, 126, 20, 0.5);
    }
    .toast.danger  { 
        background: linear-gradient(135deg, rgba(220, 53, 69, 0.95), rgba(255, 107, 107, 0.95)); 
        border: 1px solid rgba(220, 53, 69, 0.6);
    }
    .toast.info    { 
        background: linear-gradient(135deg, rgba(102, 126, 234, 0.9), rgba(118, 75, 162, 0.9)); 
        border: 1px solid rgba(102, 126, 234, 0.5);
    }

    .toast-icon {
        font-size: 1.2rem;
        display: flex;
        align-items: center;
        filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
    }

    @keyframes slideIn {
        from { 
            transform: translateY(30px) scale(0.95); 
            opacity: 0; 
        }
        to { 
            transform: translateY(0) scale(1); 
            opacity: 1; 
        }
    }

    @keyframes fadeOut {
        from { opacity: 1; transform: translateY(0) scale(1); }
        to   { opacity: 0; transform: translateY(10px) scale(0.98); }
    }

    /* === 🎨 Rainbow background (адаптирован под тёмную тему) === */
    .rainbow {
        height: 100vh;
        width: 0;
        top: 0;
        position: absolute;
        transform: rotate(10deg);
        transform-origin: top right;
        z-index: -1;
        pointer-events: none;
        opacity: 0.6; /* чуть приглушённый для тёмного фона */
    }

    /* ... (ваши 10 правил .rainbow:nth-child(n) остаются без изменений) ... */

    .h, .v {
        position: absolute;
        z-index: -1;
        pointer-events: none;
        opacity: 0.4;
    }
    .h { box-shadow: 0 0 50vh 40vh rgba(255,255,255,0.15); width: 100vw; height: 0; bottom: 0; left: 0; }
    .v { box-shadow: 0 0 35vw 25vw rgba(255,255,255,0.1); width: 0; height: 100vh; bottom: 0; left: 0; }

    /* === 🎯 Фокус для доступности === */
    button:focus-visible {
        outline: 2px solid #667eea;
        outline-offset: 2px;
    }

    /* === 📱 Адаптивность === */
    @media (max-width: 768px) {
        .header {
            flex-direction: column;
            gap: 12px;
            text-align: center;
        }
        .controls {
            justify-content: center;
        }
        .legend {
            flex-wrap: wrap;
            gap: 12px;
        }
        button {
            padding: 9px 18px;
            font-size: 0.85rem;
        }
    }

    <!-- Генерируем 25 радуг через JS для чистоты HTML -->
    <script>
        // Создаем 25 элементов .rainbow динамически
        for (let i = 0; i < 10; i++) {
            const r = document.createElement('div');
            r.className = 'rainbow';
            document.body.appendChild(r);
        }
    </script>
    <div class="header">
      <h2>🛰️ Мониторинг нефтепровода — ArUco 10×10</h2>
      <div class="controls">
        <button id="start" class="btn-start" onclick="startMission()">▶️ Старт</button>
        <button id="stop" class="btn-stop" onclick="stopMission()">⏹️ Стоп</button>
        <button id="kill" class="btn-kill" onclick="kill()">💀 Kill</button>
        <span id="status" class="status">Статус: idle</span>
      </div>
    </div>
    
    <div id="map-container">
      <canvas id="map" width="550" height="550"></canvas>
    </div>
    
    <div class="legend">
      <div class="legend-item"><span class="legend-color drone-color"></span> Дрон</div>
      <div class="legend-item"><span class="legend-color tap-color"></span> Врезка</div>
      <!-- <div class="legend-item"><span class="legend-color marker-color"></span> ArUco-маркер</div> -->
      <div class="legend-item">Шаг сетки: 1 м</div>
    </div>
    
    <h3>Найденные врезки:</h3>
    <ul id="taps-list"></ul>
    
    <script>
      // Настройки
      const MAP_SIZE_M = 10;           // 10×10 м
      const PX_PER_M = 50;             // масштаб: 1 м = 50 px
      const OFFSET_X = 25;             // отступ слева/сверху (для маркеров у края)
      const OFFSET_Y = 25;
      
      let drone = { x: 0, y: 0, yaw: -1.57 };
      let taps = [];                   // [{x, y}, ...]
      let route = [];                  // [{x, y}, ...]
      let status = 'idle';
      let markers = [];   // [{id, x, y, z, length}, ...]

      const canvas = document.getElementById('map');
      const ctx = canvas.getContext('2d');
      
      // --- Отрисовка карты ---
      function drawMap() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (markers.length === 0) {
          // Fallback: draw placeholder grid if no map yet
          drawFallbackGrid();
          drawDroneAndTaps();
          return;
        }

        // 🔍 Determine map bounds from real markers
        const xs = markers.map(m => m.x);
        const ys = markers.map(m => m.y);
        const minX = Math.min(...xs);
        const maxX = Math.max(...xs);
        const minY = Math.min(...ys);
        const maxY = Math.max(...ys);

        // Add small padding (e.g., 0.5 m)
        const padding = 0.5;
        const mapWidth = maxX - minX + 2 * padding;
        const mapHeight = maxY - minY + 2 * padding;

        // Fit map to canvas (550×550) with margins
        const margin = 30;
        const scaleX = (canvas.width - 2 * margin) / mapWidth;
        const scaleY = (canvas.height - 2 * margin) / mapHeight;
        const scale = Math.min(scaleX, scaleY); // preserve aspect ratio

        // Compute offsets so map is centered
        const offsetX = margin + (canvas.width - 2 * margin - mapWidth * scale) / 2;
        const offsetY = margin + (canvas.height - 2 * margin - mapHeight * scale) / 2;

        // Helper: world → pixel
        function toPx(worldX, worldY) {
          const px = offsetX + (worldX - (minX - padding)) * scale;
          const py = canvas.height - (offsetY + (worldY - (minY - padding)) * scale); // flip Y: 0 at bottom
          return { x: px, y: py };
        }

        // 🔷 Draw axes grid (light gray, 1m steps)
        ctx.strokeStyle = '#e0e0e0';
        ctx.lineWidth = 1;

        // Draw vertical lines (X direction)
        for (let x = Math.floor(minX - padding); x <= Math.ceil(maxX + padding); x++) {
          const p = toPx(x, minY - padding);
          const q = toPx(x, maxY + padding);
          ctx.beginPath();
          ctx.moveTo(p.x, p.y);
          ctx.lineTo(q.x, q.y);
          ctx.stroke();
        }

        // Draw horizontal lines (Y direction)
        for (let y = Math.floor(minY - padding); y <= Math.ceil(maxY + padding); y++) {
          const p = toPx(minX - padding, y);
          const q = toPx(maxX + padding, y);
          ctx.beginPath();
          ctx.moveTo(p.x, p.y);
          ctx.lineTo(q.x, q.y);
          ctx.stroke();
        }

        // 🔲 Draw real ArUco markers
        markers.forEach(m => {
          const center = toPx(m.x, m.y);
          const half = (m.length / 2) * scale;
          // Draw square (rotated 0° — assume upright)
          ctx.fillStyle = '#6c757d';
          ctx.fillRect(center.x - half, center.y - half, 2 * half, 2 * half);
          ctx.strokeStyle = '#495057';
          ctx.lineWidth = 1;
          ctx.strokeRect(center.x - half, center.y - half, 2 * half, 2 * half);
          // ID label
          ctx.fillStyle = '#fff';
          ctx.font = '10px Arial';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(`#${m.id}`, center.x, center.y);
        });

        // ▶️ Draw route (if any)
        if (route.length > 1) {
          ctx.strokeStyle = '#00FF00'; // green
          ctx.lineWidth = 7;
          ctx.beginPath();
          route.forEach((pt, i) => {
            const p = toPx(pt.x, pt.y);
            if (i === 0) ctx.moveTo(p.x, p.y);
            else ctx.lineTo(p.x, p.y);
          });
          ctx.stroke();
        }

        // 🔴 Draw taps
        ctx.fillStyle = '#dc3545';
        taps.forEach(t => {
          // Assuming t is {x, y} or just [x, y, z...]
          const x = typeof t === 'object' ? t.x : t[0];
          const y = typeof t === 'object' ? t.y : t[1];
          const p = toPx(x, y);
          ctx.beginPath();
          ctx.arc(p.x, p.y, 8, 0, 2 * Math.PI);
          ctx.fill();
          ctx.strokeStyle = '#fff';
          ctx.lineWidth = 2;
          ctx.stroke();
        });

        // 🛰️ Draw drone
        const d = toPx(drone.x, drone.y);
        ctx.save();
        ctx.translate(d.x, d.y);
        ctx.rotate(-drone.yaw); // rotate triangle
        ctx.fillStyle = '#007bff';
        ctx.beginPath();
        ctx.moveTo(0, -10);
        ctx.lineTo(-6, 8);
        ctx.lineTo(6, 8);
        ctx.closePath();
        ctx.fill();
        ctx.restore();

        // Axis labels (optional)
        ctx.fillStyle = '#333';
        ctx.font = '12px Arial';
        ctx.textAlign = 'left';
        ctx.fillText('X →', canvas.width - 40, canvas.height - 10);
        ctx.save();
        ctx.translate(15, canvas.height - 15);
        ctx.rotate(-Math.PI / 2);
        ctx.textAlign = 'center';
        ctx.fillText('Y ↑', 0, 0);
        ctx.restore();
      }

      // Fallback: draw 10×10 grid if no map yet
      function drawFallbackGrid() {
        const MAP_SIZE_M = 10;
        const PX_PER_M = 50;
        const OFFSET_X = 25;
        const OFFSET_Y = 25;

        ctx.strokeStyle = '#e0e0e0';
        ctx.lineWidth = 1;
        for (let i = 0; i <= MAP_SIZE_M; i++) {
          const x = OFFSET_X + i * PX_PER_M;
          const y0 = OFFSET_Y;
          const y1 = OFFSET_Y + MAP_SIZE_M * PX_PER_M;
          ctx.beginPath();
          ctx.moveTo(x, y0); ctx.lineTo(x, y1);
          ctx.moveTo(y0, x); ctx.lineTo(y1, x);
          ctx.stroke();
        }

        // Grid markers (placeholder)
        ctx.fillStyle = '#ccc';
        for (let i = 0; i < 10; i++) {
          for (let j = 0; j < 10; j++) {
            ctx.fillRect(OFFSET_X + i * PX_PER_M - 2, OFFSET_Y + j * PX_PER_M - 2, 4, 4);
          }
        }
      }

      function drawDroneAndTaps() {
        // Reuse existing drone/tap drawing logic, but with fallback coords
        const MAP_SIZE_M = 10;
        const PX_PER_M = 50;
        const OFFSET_X = 25;
        const OFFSET_Y = 25;

        const dx = OFFSET_X + drone.x * PX_PER_M;
        const dy = OFFSET_Y + (MAP_SIZE_M - drone.y) * PX_PER_M;
        ctx.save();
        ctx.translate(dx, dy);
        ctx.rotate(-drone.yaw);
        ctx.fillStyle = '#007bff';
        ctx.beginPath();
        ctx.moveTo(0, -10);
        ctx.lineTo(-6, 8);
        ctx.lineTo(6, 8);
        ctx.closePath();
        ctx.fill();
        ctx.restore();


        ctx.fillStyle = '#dc3545';
        taps.forEach(t => {
          const x = typeof t === 'object' ? t.x : t[0];
          const y = typeof t === 'object' ? t.y : t[1];
          const px = OFFSET_X + x * PX_PER_M;
          const py = OFFSET_Y + (MAP_SIZE_M - y) * PX_PER_M;
          ctx.beginPath();
          ctx.arc(px, py, 8, 0, 2 * Math.PI);
          ctx.fill();
          ctx.strokeStyle = '#fff';
          ctx.lineWidth = 2;
          ctx.stroke();
        });
      }
      
        // Дрон (треугольник, ориентированный по yaw)
        const dx = OFFSET_X + drone.x * PX_PER_M;
        const dy = OFFSET_X + (MAP_SIZE_M - drone.y) * PX_PER_M; // ←⚠️ Fixed: was OFFSET_Y before
        ctx.save();
        ctx.translate(dx, dy);
        ctx.rotate(-drone.yaw);
        ctx.fillStyle = '#007bff';
        ctx.beginPath();
        ctx.moveTo(0, -10);
        ctx.lineTo(-6, 8);
        ctx.lineTo(6, 8);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      
        // Подписи осей
        ctx.fillStyle = '#333';
        ctx.font = '12px Arial';
        ctx.fillText('X →', OFFSET_X + MAP_SIZE_M * PX_PER_M + 10, OFFSET_Y + MAP_SIZE_M * PX_PER_M + 15);
        ctx.save();
        ctx.translate(10, OFFSET_Y + MAP_SIZE_M * PX_PER_M + 10);
        ctx.rotate(-Math.PI / 2);
        ctx.fillText('Y ↑', 0, 0);
        ctx.restore();
      

      async function fetchMap() {
        try {
          const res = await fetch('/map');
          const data = await res.json();
          markers = data.markers || [];
        } catch (e) {
          console.warn('Не удалось получить карту ArUco');
          markers = [];
        }
      }

      // --- Запросы к серверу ---
      async function fetchDrone() {
        try {
          const res = await fetch('/drone');
          const data = await res.json();
          drone = { x: data.x, y: data.y, yaw: data.yaw - 1.57 };
        } catch (e) {
          console.warn('Не удалось получить позицию дрона');
        }
      }
      
      
      async function fetchTaps() {
        try {
          const res = await fetch('/taps');
          const data = await res.json(); // [{x:1.2, y:1.5}, ...]
          taps = data;
        } catch (e) {
          console.warn('Не удалось получить список врезок', e);
        }
      }
      
      async function fetchStatus() {
        try {
          const res = await fetch('/status');
          const data = await res.json();
          status = data.status || 'unknown';
          document.getElementById('status').innerText = `Статус: ${status}`;
          document.getElementById('status').className = `status status-${status}`;
          const startBtn = document.getElementById('start');
          startBtn.disabled = (status === 'flying');
        } catch (e) {
          console.warn('Не удалось получить статус');
        }
      }
      
      // ✅ NEW: Fetch route (list of points)
      async function fetchRoute() {
        try {
          const res = await fetch('/route');
          const data = await res.json(); // expects: [{x: ..., y: ..., yaw: ...}, ...]
          route = data;
        } catch (e) {
          console.warn(e);
          route = [];
        }
      }
      
      // --- Обновление ---
      function update() {
        Promise.all([fetchDrone(), fetchTaps(), fetchStatus(), fetchRoute(), fetchMap()]).then(() => {
          drawMap();
          updateTapsList();
        });
      }
      
      function updateTapsList() {
        const list = document.getElementById('taps-list');
        list.innerHTML = taps.length === 0
          ? '<li>Врезки не обнаружены</li>'
          : taps.map((t, i) => `<li><strong>#${i+1}</strong>: (${t.x.toFixed(2)}, ${t.y.toFixed(2)}) м</li>`).join('');
      }
      
      // --- Управление ---
      async function sendCommand(cmd) {
        try {
          await fetch('/command', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ command: cmd })
          });
        } catch (e) {
          console.log(e)
          alert('Ошибка отправки команды');
        }
      }
      function startMission() { sendCommand('start'); }
      function stopMission()  { sendCommand('stop'); }
      function kill()         { sendCommand('kill'); }
      
      // --- Инициализация ---
      drawMap();
      setInterval(update, 300);
      
      // Поддержка масштабирования колесом (опционально)
      canvas.addEventListener('wheel', (e) => {
        e.preventDefault();
        // zoom logic can be added later
      }, { passive: false });
      </script>
    
</body>
